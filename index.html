<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mes Vacances</title>
    <style>
        body { 
            font-family: system-ui, -apple-system, sans-serif; 
            background: #f4f7f6; 
            margin: 0; 
            padding: 20px; 
            color: #333; 
        }
        h1 { 
            text-align: center; 
            color: #2c3e50; 
        }
        .container { 
            max-width: 600px; 
            margin: 0 auto; 
        }
        .card { 
            background: white; 
            padding: 20px; 
            border-radius: 12px; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.1); 
            margin-bottom: 20px; 
        }
        label { 
            font-weight: bold; 
            font-size: 0.9em; 
            display: block; 
            margin-bottom: 5px; 
        }
        .form-group { 
            margin-bottom: 15px; 
        }
        input { 
            width: 100%; 
            padding: 10px; 
            border: 1px solid #ccc; 
            border-radius: 8px; 
            box-sizing: border-box; 
            font-family: inherit;
        }
        button { 
            background: #3498db; 
            color: white; 
            border: none; 
            padding: 10px 15px; 
            border-radius: 8px; 
            cursor: pointer; 
            font-weight: bold; 
            font-size: 1em;
        }
        button:hover { 
            background: #2980b9; 
        }
        .btn-danger { 
            background: #e74c3c; 
        }
        .btn-danger:hover { 
            background: #c0392b; 
        }
        .btn-edit { 
            background: #f39c12; 
        }
        .btn-edit:hover { 
            background: #e67e22; 
        }
        .btn-secondary {
            background: #7f8c8d;
        }
        .btn-secondary:hover {
            background: #95a5a6;
        }
        .activites-container { 
            border: 1px solid #eee; 
            padding: 15px; 
            border-radius: 8px; 
            background: #fafafa; 
        }
        .flex-row { 
            display: flex; 
            gap: 10px; 
            align-items: stretch; 
        }
        .flex-row input { 
            flex-grow: 1; 
            margin-bottom: 0; 
        }
        ul { 
            padding-left: 20px; 
            margin-top: 10px; 
        }
        li { 
            margin-bottom: 8px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
        }
        .btn-small { 
            padding: 5px 10px; 
            font-size: 0.8em; 
        }
        .actions-voyage { 
            display: flex; 
            gap: 10px; 
            margin-top: 15px; 
        }
        .export-import-zone {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            justify-content: center;
        }
        #file-input {
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Mes Vacances</h1>

        <div class="export-import-zone">
            <button class="btn-secondary" onclick="exporterJSON()">Exporter (Sauvegarder)</button>
            <button class="btn-secondary" onclick="declencherImport()">Importer (Charger)</button>
            <input type="file" id="file-input" accept=".json" onchange="importerJSON(event)">
        </div>

        <div class="card">
            <form id="form-voyage">
                <input type="hidden" id="edit-index" value="-1">
                
                <div class="form-group">
                    <label for="destination">Destination</label>
                    <input type="text" id="destination" required>
                </div>
                
                <div class="flex-row form-group">
                    <div style="flex: 1;">
                        <label for="date-debut">Début</label>
                        <input type="date" id="date-debut" required>
                    </div>
                    <div style="flex: 1;">
                        <label for="date-fin">Fin</label>
                        <input type="date" id="date-fin" required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="budget">Budget estimé (€)</label>
                    <input type="number" id="budget">
                </div>

                <div class="form-group activites-container">
                    <label>Activités prévues</label>
                    <div class="flex-row">
                        <input type="text" id="nouvelle-activite" placeholder="Ex: Visite du musée">
                        <button type="button" id="btn-add-activite">Ajouter</button>
                    </div>
                    <ul id="liste-activites-temp"></ul>
                </div>

                <button type="submit" id="btn-submit" style="width: 100%;">Enregistrer le voyage</button>
                <button type="button" id="btn-cancel" class="btn-danger" style="width: 100%; margin-top: 10px; display: none;">Annuler la modification</button>
            </form>
        </div>

        <div id="liste-voyages"></div>
    </div>

    <script>
        let voyages = JSON.parse(localStorage.getItem('mesVoyagesData')) || [];
        let activitesTemp = [];

        const formVoyage = document.getElementById('form-voyage');
        const editIndexInput = document.getElementById('edit-index');
        const inputActivite = document.getElementById('nouvelle-activite');
        const btnAddActivite = document.getElementById('btn-add-activite');
        const listeActivitesTemp = document.getElementById('liste-activites-temp');
        const listeVoyages = document.getElementById('liste-voyages');
        const btnSubmit = document.getElementById('btn-submit');
        const btnCancel = document.getElementById('btn-cancel');

        function afficherActivitesTemp() {
            listeActivitesTemp.innerHTML = '';
            activitesTemp.forEach((act, index) => {
                const li = document.createElement('li');
                li.innerHTML = `
                    <span>${act}</span>
                    <button type="button" class="btn-danger btn-small" onclick="supprimerActiviteTemp(${index})">X</button>
                `;
                listeActivitesTemp.appendChild(li);
            });
        }

        btnAddActivite.addEventListener('click', () => {
            const val = inputActivite.value.trim();
            if (val !== '') {
                activitesTemp.push(val);
                inputActivite.value = '';
                afficherActivitesTemp();
            }
        });

        window.supprimerActiviteTemp = function(index) {
            activitesTemp.splice(index, 1);
            afficherActivitesTemp();
        };

        function afficherVoyages() {
            listeVoyages.innerHTML = '';
            voyages.forEach((v, index) => {
                const card = document.createElement('div');
                card.className = 'card';
                card.style.borderLeft = '5px solid #3498db';

                let activitesHtml = v.activites.length > 0 
                    ? '<ul>' + v.activites.map(a => `<li>${a}</li>`).join('') + '</ul>'
                    : '<p><em>Aucune activité prévue</em></p>';

                card.innerHTML = `
                    <h2 style="margin-top:0;">${v.destination}</h2>
                    <p><strong>Dates :</strong> ${v.dateDebut} au ${v.dateFin}</p>
                    ${v.budget ? `<p><strong>Budget :</strong> ${v.budget} €</p>` : ''}
                    <p><strong>Activités :</strong></p>
                    ${activitesHtml}
                    <div class="actions-voyage">
                        <button class="btn-edit" onclick="editerVoyage(${index})">Modifier</button>
                        <button class="btn-danger" onclick="supprimerVoyage(${index})">Supprimer</button>
                    </div>
                `;
                listeVoyages.appendChild(card);
            });
        }

        formVoyage.addEventListener('submit', (e) => {
            e.preventDefault();
            
            const voyage = {
                destination: document.getElementById('destination').value,
                dateDebut: document.getElementById('date-debut').value,
                dateFin: document.getElementById('date-fin').value,
                budget: document.getElementById('budget').value,
                activites: [...activitesTemp]
            };

            const editIndex = parseInt(editIndexInput.value);

            if (editIndex === -1) {
                voyages.push(voyage);
            } else {
                voyages[editIndex] = voyage;
            }

            sauvegarderEtRafraichir();
            reinitialiserFormulaire();
        });

        window.supprimerVoyage = function(index) {
            voyages.splice(index, 1);
            sauvegarderEtRafraichir();
            if (parseInt(editIndexInput.value) === index) {
                reinitialiserFormulaire();
            }
        };

        window.editerVoyage = function(index) {
            const v = voyages[index];
            document.getElementById('destination').value = v.destination;
            document.getElementById('date-debut').value = v.dateDebut;
            document.getElementById('date-fin').value = v.dateFin;
            document.getElementById('budget').value = v.budget || '';
            
            activitesTemp = [...v.activites];
            editIndexInput.value = index;
            
            btnSubmit.textContent = "Mettre à jour le voyage";
            btnCancel.style.display = "block";
            
            afficherActivitesTemp();
            window.scrollTo(0, 0);
        };

        btnCancel.addEventListener('click', reinitialiserFormulaire);

        function reinitialiserFormulaire() {
            formVoyage.reset();
            activitesTemp = [];
            editIndexInput.value = -1;
            btnSubmit.textContent = "Enregistrer le voyage";
            btnCancel.style.display = "none";
            afficherActivitesTemp();
        }

        function sauvegarderEtRafraichir() {
            localStorage.setItem('mesVoyagesData', JSON.stringify(voyages));
            afficherVoyages();
        }

        window.exporterJSON = function() {
            const dataStr = JSON.stringify(voyages, null, 2);
            const dataBlob = new Blob([dataStr], { type: 'application/json' });
            const url = URL.createObjectURL(dataBlob);
            
            const link = document.createElement('a');
            link.href = url;
            link.download = 'mes_vacances.json';
            link.click();
            
            URL.revokeObjectURL(url);
        };

        window.declencherImport = function() {
            document.getElementById('file-input').click();
        };

        window.importerJSON = function(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const importedData = JSON.parse(e.target.result);
                    if (Array.isArray(importedData)) {
                        voyages = importedData;
                        sauvegarderEtRafraichir();
                        alert("Importation réussie !");
                    } else {
                        alert("Format de fichier invalide.");
                    }
                } catch (err) {
                    alert("Erreur lors de la lecture du fichier.");
                }
            };
            reader.readAsText(file);
        };

        afficherVoyages();
        afficherActivitesTemp();
    </script>
</body>
</html>
